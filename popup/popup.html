<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEURO-READS</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo-row">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- N lettermark with book pages -->
            <path d="M7 5V23" stroke="#2D2D2D" stroke-width="2.2" stroke-linecap="round"/>
            <path d="M7 5L17 19" stroke="#2D2D2D" stroke-width="2.2" stroke-linecap="round"/>
            <path d="M17 5V23" stroke="#2D2D2D" stroke-width="2.2" stroke-linecap="round"/>
            <!-- Book page curves -->
            <path d="M7 5C7 5 5 6 5 8" stroke="#2D2D2D" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M17 5C17 5 20 4 22 6" stroke="#2D2D2D" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M17 23C17 23 20 22 22 20" stroke="#2D2D2D" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="logo-text">
          <h1>NEURO-READS</h1>
          <span class="subtitle">Dyslexia Reading Assistant</span>
        </div>
      </div>
    </header>

    <!-- Toggle Controls -->
    <main class="controls">
      <!-- AI Simplification -->
      <div class="control-card" id="card-ai">
        <div class="control-info">
          <div class="control-icon">🧠</div>
          <div class="control-text">
            <span class="control-label">AI Text Simplification</span>
            <span class="control-desc">Simplify complex text using AI</span>
          </div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-ai">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- OpenDyslexic Font -->
      <div class="control-card" id="card-font">
        <div class="control-info">
          <div class="control-icon">🔤</div>
          <div class="control-text">
            <span class="control-label">OpenDyslexic Font</span>
            <span class="control-desc">Apply dyslexia-friendly typeface</span>
          </div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-font">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- Larger Text -->
      <div class="control-card" id="card-text">
        <div class="control-info">
          <div class="control-icon">📏</div>
          <div class="control-text">
            <span class="control-label">Larger Text</span>
            <span class="control-desc">Increase size, line & letter spacing</span>
          </div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-text">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- Cream Background -->
      <div class="control-card" id="card-bg">
        <div class="control-info">
          <div class="control-icon">🎨</div>
          <div class="control-text">
            <span class="control-label">Cream Background</span>
            <span class="control-desc">Soft background to reduce strain</span>
          </div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-bg">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </main>

    <!-- Footer -->
    <footer class="popup-footer">
      <span>v1.0.0 • Made with ❤️ for accessibility</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
